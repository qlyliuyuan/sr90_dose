server {
    listen 80;
    server_name lyr12.art www.lyr12.art;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lyr12.art www.lyr12.art;

    ssl_certificate     /etc/nginx/ssl/lyr12.art.pem;
    ssl_certificate_key /etc/nginx/ssl/lyr12.art.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /sr90 {
        proxy_pass         http://127.0.0.1:8501/sr90;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /sr90/stream {
        proxy_pass         http://127.0.0.1:8501/sr90/stream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400;
    }
}
